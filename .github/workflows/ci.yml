name: CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'Money Manager/**'
      - 'Money ManagerTests/**'
      - 'Money ManagerUITests/**'
      - 'Money Manager.xcodeproj/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'Money Manager/**'
      - 'Money ManagerTests/**'
      - 'Money ManagerUITests/**'
      - 'Money Manager.xcodeproj/**'
      - '.github/workflows/ci.yml'
      
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30
    env:
      MIN_XCODE_VERSION: '16.4'
      MIN_MACOS_VERSION: '15.0'
    steps:
      - uses: actions/checkout@v4

      - name: Verify environment
        run: |
          XCODE_VERSION=$(xcodebuild -version | head -1 | awk '{print $2}')
          MACOS_VERSION=$(sw_vers -productVersion)
          echo "Xcode: $XCODE_VERSION (min: ${{ env.MIN_XCODE_VERSION }})"
          echo "macOS: $MACOS_VERSION (min: ${{ env.MIN_MACOS_VERSION }})"
          if [ "$(printf '%s\n' "${{ env.MIN_XCODE_VERSION }}" "$XCODE_VERSION" | sort -V | head -1)" != "${{ env.MIN_XCODE_VERSION }}" ]; then
            echo "::error::Xcode $XCODE_VERSION is below minimum ${{ env.MIN_XCODE_VERSION }}"
            exit 1
          fi
          if [ "$(printf '%s\n' "${{ env.MIN_MACOS_VERSION }}" "$MACOS_VERSION" | sort -V | head -1)" != "${{ env.MIN_MACOS_VERSION }}" ]; then
            echo "::error::macOS $MACOS_VERSION is below minimum ${{ env.MIN_MACOS_VERSION }}"
            exit 1
          fi

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('Money Manager.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Build
        run: make build

      - name: Run All Tests
        run: make test

      - name: Install xcresultparser
        if: always()
        run: |
          which xcresultparser || brew install xcresultparser

      - name: Convert xcresult to JUnit XML
        if: always()
        run: |
          xcresultparser -o junit ./test_results.xcresult > ./test_results.xml || true

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: './test_results.xml'

      - name: Extract Coverage
        if: always()
        run: |
          COVERAGE=$(xcrun xccov view --report --json ./test_results.xcresult 2>/dev/null | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              for t in data.get('targets', []):
                  if t.get('name', '') == 'Money Manager.app':
                      print(f\"{t['lineCoverage']*100:.1f}\")
                      sys.exit(0)
              print('0.0')
          except:
              print('0.0')
          " || echo "0.0")
          echo "COVERAGE=${COVERAGE}" >> $GITHUB_ENV
          echo "### 📊 Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Money Manager.app**: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY

      - name: Check Coverage Threshold
        run: |
          if (( $(echo "${{ env.COVERAGE }} < 50" | bc -l) )); then
            echo "::warning::Coverage ${{ env.COVERAGE }}% is below 50% threshold"
          fi

      - name: Update Coverage Badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: money-manager-ios-coverage.json
          label: coverage
          message: ${{ env.COVERAGE }}%
          valColorRange: ${{ env.COVERAGE }}
          minColorRange: 0
          maxColorRange: 100

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test_results.xcresult
          retention-days: 30
