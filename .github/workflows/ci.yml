name: CI

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - feat/**
  pull_request:
    branches:
      - main
      - develop
      - release/**
      - feat/**

env:
  XCODE_VERSION: ""

jobs:
  build:
    name: Build
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        if: env.XCODE_VERSION != ''
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Build
        run: make build

  test:
    name: Tests
    needs: build
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Run All Tests
        run: make test

      - name: Install xcresultparser
        run: |
          brew install xcresultparser

      - name: Convert xcresult to JUnit XML
        if: always()
        run: |
          xcresultparser -o junit ./test_results.xcresult > ./test_results.xml || true

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@v1
        with:
          files: ./test_results.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./test_results.xcresult
          name: money-manager-ios
          flags: unittests
          options: -J 'Money Manager'
          fail_ci_if_error: false
          
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test_results.xcresult
          retention-days: 30

  deploy:
    name: Deploy
    needs: [build, test]
    runs-on: [self-hosted, macOS, ARM64]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to TestFlight
        run: echo "TODO - Add TestFlight deployment steps"
