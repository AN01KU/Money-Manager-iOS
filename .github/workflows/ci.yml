name: CI

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - feat/**
  pull_request:
    branches:
      - main
      - develop
      - release/**
      - feat/**

env:
  XCODE_VERSION: "26.2"

jobs:
  build:
    name: Build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Build
        run: make build

  test:
    name: Tests
    needs: build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Run Tests
        run: make test-unit

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        with:
          files: ./test_results.xcresult
          flags: unittests
          name: money-manager-ios

  deploy:
    name: Deploy
    needs: [build, test]
    runs-on: macos-26
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to TestFlight
        run: echo "TODO - Add TestFlight deployment steps"
