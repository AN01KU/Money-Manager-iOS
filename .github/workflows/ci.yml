name: CI

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - feat/**
  pull_request:
    branches:
      - main
      - develop
      - release/**
      - feat/**

env:
  XCODE_VERSION: "26.2"

jobs:
  build:
    name: Build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Build
        run: make build

  test-local:
    name: Tests (Local CI)
    needs: build
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Run All Tests
        run: make test

      - name: Install xcresultparser
        run: |
          brew install xcresultparser

      - name: Convert xcresult to JUnit XML
        if: always()
        run: |
          xcresultparser -o junit ./test_results.xcresult > ./test_results.xml || true

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@v1
        with:
          files: ./test_results.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./test_results.xcresult
          name: money-manager-ios
          fail_ci_if_error: false

  test-ci:
    name: Tests (CI)
    needs: build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Run Unit Tests
        run: make test-unit

      - name: Install xcresultparser
        run: |
          brew install xcresultparser

      - name: Convert xcresult to JUnit XML
        if: always()
        run: |
          xcresultparser -o junit ./test_results.xcresult > ./test_results.xml || true

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@v1
        with:
          files: ./test_results.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    name: Deploy
    needs: [build, test-local, test-ci]
    runs-on: macos-26
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to TestFlight
        run: echo "TODO - Add TestFlight deployment steps"
